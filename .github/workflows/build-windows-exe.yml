name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "microfiche_overlap_extractor.py"
      - "requirements.txt"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name MicroficheOverlapExtractor microfiche_overlap_extractor.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicroficheOverlapExtractor-windows
          path: dist/MicroficheOverlapExtractor.exe
          if-no-files-found: error
